spring:
  application:
    name: signal-service
  profiles:
    active: local

---

# ================================
# Kafka Consumer / Producer
# ================================
spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: signal-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      backs: all
      retries: 3
      properties:
        enable.idempotence: true
        spring.json.add.type.headers: false

# ================================
# Redis
# ================================
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# ================================
# Kafka Topics
# ================================
kafka:
  topics:
    raw-market: raw.market
    raw-after-hours: raw.after-hours
    raw-news: raw.news
    signal-detected: signal.detected
    signal-rejected: signal.rejected

# ================================
# Scanner 임계값
# ================================
scanner:
  volume-surge:
    threshold-ratio: 2.0       # 전일 대비 거래량 2배 이상
    min-volume: 10000          # 최소 거래량 필터
    eod-ttl-hours: 48          # EOD 스냅샷 TTL (주말 커버)
    last-volume-ttl-hours: 2   # 최근 누적 거래량 TTL
  gap-up:
    threshold-percent: 3.0     # 갭상승률 3% 이상
  after-hours-surge:
    buy-sell-ratio-threshold: 1.5   # 매수/매도 비율 1.5 이상
    price-ttl-hours: 18             # 시간외 데이터 TTL
  news-surge:
    threshold-count: 3         # 뉴스 카운트 임계값
    window-minutes: 30         # 뉴스 윈도우

# ================================
# Scorer 설정
# ================================
scorer:
  weights:
    VOLUME_SURGE: 30
    NEWS_SURGE: 25
    AFTER_HOURS_SURGE: 25
    GAP_UP: 20
  combo-bonus: 10              # 2개 이상 신호 동시 발생 시 보너스
  min-score: 25                # 최소 점수 (이하 무시)

# ================================
# Validator 설정
# ================================
validator:
  dedup-ttl-minutes: 60        # 동일 신호 중복 방지 TTL
  cooldown-minutes: 30         # 종목별 쿨다운
  burst-limit: 5               # 버스트 제한 (윈도우 내 최대 신호 수)
  burst-window-minutes: 60     # 버스트 윈도우

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.signal.signalservice: DEBUG

server:
  port: 8082
