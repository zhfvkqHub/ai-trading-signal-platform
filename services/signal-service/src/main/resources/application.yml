spring:
  application:
    name: signal-service
  profiles:
    active: local

---

# ================================
# Kafka Consumer / Producer
# ================================
spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    listener:
      concurrency: 3              # 파티션 수에 맞춰 병렬 처리 (기본값 1에서 상향)
    consumer:
      group-id: signal-service
      auto-offset-reset: latest   # earliest → 재배포 시 전체 재처리로 Redis 기준값 오염 방지
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        spring.json.add.type.headers: false

# ================================
# Redis
# ================================
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# ================================
# Kafka Topics
# ================================
kafka:
  topics:
    raw-market: raw.market
    raw-after-hours: raw.after-hours
    raw-news: raw.news
    signal-detected: signal.detected
    signal-rejected: signal.rejected

# ================================
# Scanner 임계값
# ================================
scanner:
  volume-surge:
    threshold-ratio: 2.5       # 전일 대비 거래량 2.5배 이상 (3.0→2.5, 현실적 기준으로 완화)
    min-volume: 10000          # 최소 거래량 필터
    min-trading-value: 1000000000  # 최소 거래대금 10억원 (소형주 노이즈 차단)
    eod-ttl-hours: 48          # EOD 스냅샷 TTL (주말 커버)
    last-volume-ttl-hours: 2   # 최근 누적 거래량 TTL
    require-price-up: true     # 현재가가 시가 대비 상승 중인 경우만 신호 발생 (하락 중 거래량 급증 제외)
    min-price-change-rate: 0.5 # 시가대비 최소 상승률(%). 0.0→0.5, 보합 제외
  gap-up:
    threshold-percent: 2.0     # 갭상승률 2.0% 이상 (1.5→2.0, 약한 갭 제외)
    cutoff-minutes: 90         # 장 시작(09:00) 후 90분까지 갭상승 스캔 (45→90, 장중 초반 호재 대응)
  after-hours-surge:
    buy-sell-ratio-threshold: 2.0   # 매수/매도 비율 2.0 이상 (1.5→2.0, 기준 강화)
    price-ttl-hours: 18             # 시간외 데이터 TTL
    min-buy-volume: 100000          # 최소 매수 잔량 (소량 노이즈 필터)
  news-surge:
    threshold-count: 2         # 중립 공시 급증 임계값 (3→2, 호재 단일 공시는 별도 즉시 트리거)
    window-minutes: 60         # 뉴스 윈도우 (30→60분, 수집 주기 5분 기준 충분한 누적 시간 확보)
  breakout:
    period-days: 20            # N일 최고가 기준 (20일)
    min-data-days: 3           # 신호 활성화까지 필요한 최소 누적 일수 (5→3, 신규 종목 빠른 감지)
    min-breakout-percent: 1.5  # 최소 돌파율(%) 0.5→1.5, 의미 있는 돌파만
    bullish-keywords: # 호재 키워드 — 포함 시 BULLISH 분류
      - 실적
      - 흑자
      - 배당
      - 자사주
      - 수주
      - 계약
      - 특허
      - 합병
      - 인수
      - 성장
      - 증가
      - 호실적
      - 영업이익
      - 매출증가
      - 신제품
      - 상장
    bearish-keywords: # 악재 키워드 — 포함 시 신호 제외
      - 감사의견
      - 횡령
      - 불성실
      - 조사
      - 소송
      - 적자
      - 부도
      - 파산
      - 위반
      - 과징금
      - 제재
      - 거래정지
      - 상장폐지
      - 분식

# ================================
# Scorer 설정
# ================================
scorer:
  weights:
    VOLUME_SURGE: 25           # 30→25 (방향성 모호, 하락에서도 발생) — 이제 방향 필터로 보완
    NEWS_SURGE: 25             # 20→25 복원 (감성 분류가 이미 적용됨 — 가중치 감산이 이중 패널티였음)
    AFTER_HOURS_SURGE: 30      # 25→30 (방향성 예측력 가장 높음)
    GAP_UP: 25                 # 20→25 (강한 방향성 신호)
    BREAKOUT: 35               # N일 최고가 돌파 — 가장 강한 추세 확인 신호
  combo-bonus-2: 10            # 2개 신호 동시 (표준)
  combo-bonus-3: 20            # 3개 신호 동시 (표준)
  combo-bonus-4: 30            # 4개 신호 동시 (표준)
  combo-bonus-premium: 35      # 프리미엄 조합(시간외+갭상승+거래량) 보너스
  min-score: 35                # 40→35 (단일 강한 신호 + intensity bonus로 통과 가능하도록)
  bullish-news-bonus: 10       # 호재 공시로 분류된 NEWS_SURGE 추가 보너스
  volume-price-change-tier2-rate: 1.0  # VOLUME_SURGE 시가대비 1% 이상 → tier2 보너스 (+5)
  volume-price-change-tier3-rate: 3.0  # VOLUME_SURGE 시가대비 3% 이상 → tier3 보너스 (+10)
  intensity:
    VOLUME_SURGE:
      tier2-threshold: 3.0     # 3배 이상
      tier3-threshold: 5.0     # 5배 이상
    GAP_UP:
      tier2-threshold: 3.0     # 3% 이상
      tier3-threshold: 5.0     # 5% 이상
    NEWS_SURGE:
      tier2-threshold: 5.0     # 5건 이상
      tier3-threshold: 10.0    # 10건 이상
    AFTER_HOURS_SURGE:
      tier2-threshold: 2.5     # 매수비율 2.5 이상
      tier3-threshold: 4.0     # 매수비율 4.0 이상
  intensity-tier2-bonus: 5
  intensity-tier3-bonus: 10

# ================================
# Validator 설정
# ================================
validator:
  dedup-ttl-minutes: 60        # 동일 신호 중복 방지 TTL (기본값)
  dedup-ttl-overrides:
    GAP_UP: 420                # 갭상승: 장중 전체 1회만 (7시간, 09:00~15:30 커버)
    BREAKOUT: 480              # N일 최고가 돌파: 하루 1회 (8시간)
  cooldown-minutes: 60         # 종목별 쿨다운 (30→60분, 재발 차단 강화)
  burst-limit: 5               # 버스트 제한 (윈도우 내 최대 신호 수)
  burst-window-minutes: 60     # 버스트 윈도우

# ================================
# 피드백 루프 설정
# ================================
feedback:
  check-window-minutes: 180    # 신호 발생 후 수익률 측정 대기 시간 (3시간)
  target-return-percent: 3.0   # HIT 판정 목표 수익률 (%)
  max-outcome-history: 200     # 종목 타입 조합별 최대 보관 결과 건수

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.signal.signalservice: DEBUG

server:
  port: 8082
