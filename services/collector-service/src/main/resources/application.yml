spring:
  application:
    name: collector-service
  profiles:
    active: local
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 3000   # 3초
            read-timeout: 10000     # 10초

# ================================
# Kafka Producer
# ================================
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        spring.json.add.type.headers: false

# ================================
# KIS API
# ================================
kis:
  base-url: https://openapi.koreainvestment.com:9443
  app-key: ${KIS_APP_KEY}
  app-secret: ${KIS_APP_SECRET}
  account-no: ${KIS_ACCOUNT_NO}
  rate-limit:
    requests-per-second: 19  # KIS 제한 20/s, 여유분 확보

# ================================
# DART API
# ================================
dart:
  base-url: https://opendart.fss.or.kr
  api-key: ${DART_API_KEY}
  rate-limit:
    requests-per-second: 1

# ================================
# 수집 스케줄 (cron, KST 기준)
# ================================
collector:
  schedule:
    market:
      cron: "0/30 * 9-15 * * MON-FRI"   # 장중 30초 간격
    after-hours:
      cron: "0/30 * 15-20 * * MON-FRI"   # 시간외 5분 간격
    news:
      cron: "0 0/5 * * * MON-FRI"       # 뉴스/공시 5분 간격 (10→5분, 호재 공시 빠른 포착)

# ================================
# Trading Session (KST 기준)
# ================================
trading:
  session:
    pre-market:
      start: "08:00"
      end: "09:00"
    regular:
      start: "09:00"
      end: "15:30"
    after-hours:
      start: "15:30"
      end: "20:00"

# ================================
# Kafka Topics
# ================================
kafka:
  topics:
    raw-market: raw.market
    raw-after-hours: raw.after-hours
    raw-news: raw.news

# ================================
# Actuator
# ================================
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

# ================================
# Logging
# ================================
logging:
  level:
    root: INFO
    com.signal.collectorservice: DEBUG
