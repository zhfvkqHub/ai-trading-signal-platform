<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="30">
    <title>시그널 목록 — Trading Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">📈 Trading Dashboard</span>
        <span class="text-secondary small">30초마다 자동 갱신</span>
    </div>
</nav>

<div class="container-fluid">

    <!-- 탭 -->
    <ul class="nav nav-tabs mb-4">
        <li class="nav-item">
            <a class="nav-link active" href="/signals">시그널 목록</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="/notifications">알림 내역</a>
        </li>
    </ul>

    <!-- 필터 -->
    <form method="get" action="/signals" class="row g-2 mb-4">
        <div class="col-auto">
            <select name="status" class="form-select form-select-sm">
                <option value="" th:selected="${status == ''}">전체 상태</option>
                <option value="DETECTED" th:selected="${status == 'DETECTED'}">DETECTED</option>
                <option value="REJECTED" th:selected="${status == 'REJECTED'}">REJECTED</option>
            </select>
        </div>
        <div class="col-auto">
            <input type="text" name="stockCode" class="form-control form-control-sm"
                   placeholder="종목코드" th:value="${stockCode}">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-sm btn-primary">검색</button>
            <a href="/signals" class="btn btn-sm btn-outline-secondary ms-1">초기화</a>
        </div>
        <div class="col-auto ms-auto text-muted small pt-1">
            총 <strong th:text="${signalPage.totalElements}">0</strong>건
        </div>
    </form>

    <!-- 테이블 -->
    <div class="table-responsive">
        <table class="table table-hover table-sm align-middle">
            <thead class="table-dark">
            <tr>
                <th>종목코드</th>
                <th>종목명</th>
                <th>시그널 타입</th>
                <th class="text-center">점수</th>
                <th class="text-center">상태</th>
                <th>사유</th>
                <th>발생시각 (KST)</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${signalPage.isEmpty()}">
                <td colspan="7" class="text-center text-muted py-4">데이터가 없습니다.</td>
            </tr>
            <tr th:each="s : ${signalPage.content}">
                <td class="font-monospace" th:text="${s.stockCode}"></td>
                <td th:text="${s.stockName}"></td>
                <td>
                    <span th:each="t, iter : ${#strings.arraySplit(s.signalTypes, ',')}"
                          th:text="${t}"
                          th:classappend="${iter.last} ? '' : ' me-1'"
                          class="badge signal-badge"></span>
                </td>
                <td class="text-center fw-bold" th:text="${s.score}"
                    th:classappend="${s.score >= 70} ? ' text-danger' : (${s.score >= 50} ? ' text-warning' : '')">
                </td>
                <td class="text-center">
                    <span th:if="${s.status == 'DETECTED'}" class="badge bg-success">DETECTED</span>
                    <span th:if="${s.status == 'REJECTED'}" class="badge bg-secondary">REJECTED</span>
                </td>
                <td class="text-truncate reason-cell"
                    th:text="${s.status == 'DETECTED'} ? ${s.reasons} : ${s.rejectionReason}"
                    th:title="${s.status == 'DETECTED'} ? ${s.reasons} : ${s.rejectionReason}">
                </td>
                <td class="font-monospace small" th:text="${#temporals.format(s.eventAt, 'MM-dd HH:mm:ss', 'Asia/Seoul')}"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- 페이지네이션 -->
    <nav th:if="${signalPage.totalPages > 1}">
        <ul class="pagination pagination-sm justify-content-center">
            <li class="page-item" th:classappend="${signalPage.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/signals(page=${currentPage - 1}, status=${status}, stockCode=${stockCode})}">
                    이전
                </a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, signalPage.totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:href="@{/signals(page=${i}, status=${status}, stockCode=${stockCode})}"
                   th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${signalPage.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/signals(page=${currentPage + 1}, status=${status}, stockCode=${stockCode})}">
                    다음
                </a>
            </li>
        </ul>
    </nav>

</div>
</body>
</html>
